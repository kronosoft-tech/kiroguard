services:
  kiroguard:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - KIROGUARD_TRANSPORT=sse
      - KIROGUARD_PORT=3000
      - KIROGUARD_AUTH_TOKEN=
      - KIROGUARD_LOG_FORMAT=json
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}
    volumes:
      - ./config.yaml:/etc/kiroguard/config.yaml:ro
    command: ["/kiroguard", "-transport", "sse", "-port", "3000", "-config", "/etc/kiroguard/config.yaml", "-log-format", "json"]
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 5s
    restart: unless-stopped
